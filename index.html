<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Raymond Martin — Vocalist / Bass / Nashville</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,700;0,900;1,700;1,900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Special+Elite&family=Oswald:wght@200;300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --ink:      #0e0b07;
  --tobacco:  #1a1108;
  --bourbon:  #271608;
  --amber:    #c8841a;
  --gold:     #e8a832;
  --rust:     #7a2e0e;
  --cream:    #ede0c8;
  --aged:     #c4aa84;
  --smoke:    #7a6e5a;
  --paper:    #d4b896;
}

* { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }

body {
  background: var(--ink);
  color: var(--cream);
  font-family: 'Libre Baskerville', Georgia, serif;
  overflow-x: hidden;
}

body::before {
  content:'';
  position:fixed; inset:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: 0.055;
  pointer-events: none;
  z-index: 9999;
}

/* NAV */
nav {
  position: fixed; top:0; left:0; right:0; z-index:500;
  display: flex; justify-content:space-between; align-items:center;
  padding: 1.1rem 3rem;
  background: linear-gradient(to bottom, rgba(10,7,3,0.97) 0%, transparent 100%);
}
.nav-wordmark {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.5rem; letter-spacing: 0.18em; color: var(--amber);
  text-decoration: none;
}
.nav-links { display:flex; gap:2.5rem; list-style:none; }
.nav-links a {
  font-family: 'Oswald', sans-serif; font-weight:300;
  font-size: 0.72rem; letter-spacing:0.3em; text-transform:uppercase;
  color: var(--aged); text-decoration:none; transition: color 0.25s;
}
.nav-links a:hover { color: var(--gold); }

/* HERO */
.hero {
  min-height: 100vh;
  display: grid;
  grid-template-columns: 1fr 1fr;
  position: relative;
  overflow: hidden;
}
.hero-text-col {
  display: flex; flex-direction: column; justify-content: flex-end;
  padding: 7rem 3rem 5rem 5rem;
  position: relative; z-index: 2;
  background: linear-gradient(to right, rgba(14,11,7,0.98) 60%, rgba(14,11,7,0.7) 100%);
}
.poster-rule { width: 100%; height: 3px; background: linear-gradient(to right, var(--amber), transparent); margin-bottom: 1.2rem; }
.poster-rule.thin { height: 1px; background: linear-gradient(to right, rgba(200,132,26,0.5), transparent); margin-bottom: 0.6rem; margin-top:0.6rem; }
.hero-eyebrow {
  font-family: 'Oswald', sans-serif; font-weight:200; font-size: 0.72rem;
  letter-spacing:0.55em; text-transform:uppercase; color: var(--amber);
  opacity:0; animation: fadeUp 0.9s ease 0.2s forwards; margin-bottom: 0.8rem;
}
.hero-name { font-family: 'Bebas Neue', sans-serif; line-height: 0.88; opacity:0; animation: fadeUp 0.9s ease 0.4s forwards; }
.hero-name .first { display: block; font-size: clamp(5rem, 9vw, 9rem); color: var(--cream); letter-spacing: 0.04em; }
.hero-name .last  { display: block; font-size: clamp(5rem, 9vw, 9rem); color: var(--amber); letter-spacing: 0.04em; }
.hero-banner {
  margin-top: 1rem; background: var(--amber); color: var(--ink);
  font-family: 'Bebas Neue', sans-serif; font-size: 0.95rem; letter-spacing: 0.4em;
  padding: 0.4rem 0.8rem; display: inline-block; opacity:0; animation: fadeUp 0.9s ease 0.55s forwards;
}
.hero-tagline {
  font-family: 'Special Elite', cursive; font-size: 0.95rem; color: var(--smoke);
  letter-spacing: 0.06em; margin-top: 1.5rem; margin-bottom: 2rem;
  opacity:0; animation: fadeUp 0.9s ease 0.7s forwards; font-style: italic;
}
.hero-ctas { display:flex; gap:0.8rem; flex-wrap:wrap; opacity:0; animation: fadeUp 0.9s ease 0.85s forwards; }
.btn-primary {
  font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.25em;
  color: var(--ink); background: var(--amber); border:none;
  padding: 0.75rem 2rem; text-decoration:none;
  transition: background 0.25s, transform 0.2s; cursor:pointer; display:inline-block;
}
.btn-primary:hover { background:var(--gold); transform:translateY(-2px); }
.btn-ghost {
  font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.25em;
  color:var(--aged); border: 1px solid rgba(196,170,132,0.35);
  padding: 0.75rem 2rem; text-decoration:none;
  transition: border-color 0.25s, color 0.25s; cursor:pointer; display:inline-block;
}
.btn-ghost:hover { border-color: var(--amber); color: var(--amber); }

.hero-photo-col { position: relative; overflow: hidden; }
.hero-photo-col img.hero-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; object-position: center top; z-index: 0; display: block;
}
.hero-photo-col .photo-overlay {
  position: absolute; inset: 0; z-index: 1;
  background:
    linear-gradient(to left, rgba(14,11,7,0.15) 0%, rgba(14,11,7,0.8) 100%),
    linear-gradient(to bottom, rgba(14,11,7,0.0) 0%, rgba(14,11,7,0.65) 100%);
}
.vinyl {
  position: absolute; top:2rem; right:2rem; width: 200px; height:200px; border-radius:50%;
  background: radial-gradient(circle at center, #1a1108 16%, #0d0a06 17%, #0a0806 18%, #1a1108 34%, #0d0a06 35%, #0a0806 36%, #1a1108 54%, #0d0a06 55%, #0a0806 56%, #1e1408 100%);
  opacity: 0.55; animation: spin 25s linear infinite; box-shadow: 0 0 50px rgba(200,132,26,0.1); z-index: 2;
}
.vinyl::after { content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:38px; height:38px; border-radius:50%; background: radial-gradient(circle, var(--amber) 0%, #6b4010 100%); opacity:0.8; }
@keyframes spin { to { transform:rotate(360deg); } }

/* BAND STRIP */
.band {
  background: var(--amber); padding: 0.6rem 2rem;
  display: flex; align-items: center; gap: 1.5rem; overflow: hidden;
}
.band-text { font-family:'Bebas Neue',sans-serif; font-size:1rem; letter-spacing:0.35em; color:var(--ink); white-space:nowrap; flex-shrink:0; }
.band-rule { flex:1; min-width:0; height:1px; background:rgba(14,11,7,0.25); }

/* ABOUT */
.about {
  display:grid; grid-template-columns:1fr 1fr;
  max-width:1300px; margin:0 auto;
  padding:6rem 5rem; gap:5rem; align-items:center;
}
.about-photo-frame {
  aspect-ratio: 3/4;
  position: relative;
  background: #1c1208;
  padding: 18px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.6), inset 0 0 30px rgba(0,0,0,0.4);
}
.about-photo-frame img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center 30%;
  display: block;
  filter: sepia(0.08);
}
.about-text h2 {
  font-family:'Playfair Display',serif; font-weight:900;
  font-size:clamp(2.2rem,3.5vw,3.2rem); line-height:1.1;
  color:var(--cream); margin-bottom:2rem;
}
.about-text h2 em { font-style:italic; color:var(--gold); }
.a
